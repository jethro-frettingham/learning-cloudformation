AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Serverless REST API — API Gateway + Lambda + S3 + CloudWatch Alarms

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  AppName:
    Type: String
    Default: my-serverless-api
    Description: Used as a prefix for all resource names.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  LambdaRuntime:
    Type: String
    Default: python3.12
    AllowedValues: [python3.12, python3.11, nodejs20.x, nodejs18.x]

  AlarmEmail:
    Type: String
    Description: Email address to receive CloudWatch alarm notifications.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── S3 Bucket ─────────────────────────────────────────────────────────────
  AppBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AppName}-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: App
          Value: !Ref AppName
        - Key: Env
          Value: !Ref Environment

  # ── IAM Role for Lambda ────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AppBucket.Arn
                  - !Sub "${AppBucket.Arn}/*"

  # ── Lambda Function ────────────────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-${Environment}-handler"
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 29         # API Gateway max is 29 s
      MemorySize: 256
      Environment:
        Variables:
          BUCKET_NAME: !Ref AppBucket
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          # ------------------------------------
          # Starter handler — replace with your
          # own deployment package / S3 reference
          # ------------------------------------
          import json, os

          def handler(event, context):
              return {
                  "statusCode": 200,
                  "headers": {"Content-Type": "application/json"},
                  "body": json.dumps({
                      "message": "Hello from Lambda!",
                      "env": os.environ.get("ENVIRONMENT"),
                      "path": event.get("path"),
                      "method": event.get("httpMethod"),
                  }),
              }
      Tags:
        - Key: App
          Value: !Ref AppName
        - Key: Env
          Value: !Ref Environment

  # Allow API Gateway to invoke the function
  LambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*"

  # ── API Gateway ────────────────────────────────────────────────────────────
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AppName}-${Environment}"
      Description: !Sub "REST API for ${AppName} (${Environment})"
      EndpointConfiguration:
        Types: [REGIONAL]
      Tags:
        - Key: App
          Value: !Ref AppName
        - Key: Env
          Value: !Ref Environment

  # Catch-all proxy resource  →  /{proxy+}
  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: "{proxy+}"

  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE          # ← swap for AWS_IAM / COGNITO_USER_POOLS as needed
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Fn}/invocations"
          - Fn: !GetAtt ApiFunction.Arn

  # Root resource method  →  /
  RootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Fn}/invocations"
          - Fn: !GetAtt ApiFunction.Arn

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ProxyMethod
      - RootMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          MetricsEnabled: true

  # ── CloudWatch Alarms ──────────────────────────────────────────────────────
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AppName}-${Environment}-alarms"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

  # Lambda errors > 5 in 5 minutes
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-${Environment}-lambda-errors"
      AlarmDescription: Lambda function error rate is too high.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic

  # Lambda p99 duration > 10 s
  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-${Environment}-lambda-duration"
      AlarmDescription: Lambda p99 duration is approaching the timeout.
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000      # milliseconds
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # API Gateway 5xx errors > 10 in 5 minutes
  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-${Environment}-apigw-5xx"
      AlarmDescription: API Gateway is returning 5xx errors.
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub "${AppName}-${Environment}"
        - Name: Stage
          Value: !Ref Environment
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiEndpoint:
    Description: Base URL of the REST API
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AppName}-${Environment}-ApiEndpoint"

  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt ApiFunction.Arn
    Export:
      Name: !Sub "${AppName}-${Environment}-LambdaArn"

  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref AppBucket
    Export:
      Name: !Sub "${AppName}-${Environment}-BucketName"

  AlarmTopicArn:
    Description: SNS topic ARN for alarm notifications
    Value: !Ref AlarmTopic
    Export:
      Name: !Sub "${AppName}-${Environment}-AlarmTopicArn"
